<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>DelayCam - Sports Training</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Small live preview -->
    <div class="live-preview">
      <video id="live-video" autoplay muted playsinline></video>
      <div class="label">LIVE</div>
    </div>

    <!-- Large delayed playback -->
    <div class="delayed-view">
      <canvas id="delayed-canvas"></canvas>
      <div class="label">DELAYED: <span id="delay-display">10s</span></div>
      <div id="countdown" class="countdown hidden">
        <div class="countdown-text">Buffering...</div>
        <div class="countdown-timer">10</div>
        <div class="countdown-subtext">seconds until delayed video</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="start-btn" class="btn-primary">Start Camera</button>
      <button id="stop-btn" class="btn-secondary" disabled>Stop</button>

      <div class="delay-control">
        <label>
          Delay: <span id="delay-value">10</span> seconds
          <span class="memory-info">(~<span id="memory-estimate">3.1</span> MB)</span>
        </label>
        <input type="range" id="delay-slider" min="5" max="30" value="10" step="5">
      </div>

      <button id="info-btn" class="btn-icon" title="App Info">ℹ️</button>
    </div>

    <div id="status" class="status"></div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>DelayCam Info</h2>
          <button id="close-modal" class="close-btn">✕</button>
        </div>
        <div class="modal-body">
          <div class="info-item">
            <strong>Version:</strong> 1.0.0
          </div>
          <div class="info-item">
            <strong>Last Deployed:</strong>
            <span id="deploy-time">Loading...</span>
          </div>
          <div class="info-item">
            <strong>Camera:</strong>
            <span id="current-camera">Not started</span>
          </div>
          <div class="info-item">
            <strong>Delay Setting:</strong>
            <span id="current-delay">10s</span>
          </div>
          <div class="info-item small">
            Built with ❤️ for sports training
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="frame-buffer.js"></script>
  <script src="frame-capture.js"></script>
  <script src="frame-player.js"></script>
  <script src="ui-controller.js"></script>
  <script src="app.js"></script>
</body>
</html>
